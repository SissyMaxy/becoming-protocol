name: Mommy deploy on merge

# When a mommy-built PR merges to main, apply the migrations and deploy
# any new edge functions automatically. This is the second half of full
# autonomy — without auto-deploy, shipped code sits on main but production
# never sees it.
#
# REQUIRED SECRETS (operator must set in repo Settings → Secrets):
#   SUPABASE_ACCESS_TOKEN   — `supabase login --token`
#   SUPABASE_PROJECT_REF    — for `--project-ref`
#   SUPABASE_DB_PASSWORD    — for `supabase db push`
#
# When ANY of these is unset, the workflow logs the missing secrets and
# exits successfully (no email failure). This lets the workflow stay wired
# for the future without spamming failures while the operator hasn't
# provisioned secrets yet. The migrations and edge functions can still be
# applied manually from the host (`supabase db push`, `npm run deploy`).
#
# This workflow only deploys on:
#   - Push to main
#   - That changed files in supabase/migrations/ or supabase/functions/
# It does NOT deploy on PR open — only on merge.

on:
  # Manual trigger — lets a deploy be run on demand (e.g. after a workflow-only
  # change that doesn't touch the migrations/functions paths below).
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        id: secrets
        env:
          HAVE_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
          HAVE_REF: ${{ secrets.SUPABASE_PROJECT_REF != '' }}
          HAVE_PW: ${{ secrets.SUPABASE_DB_PASSWORD != '' }}
        run: |
          missing=""
          if [[ "$HAVE_TOKEN" != "true" ]]; then missing="$missing SUPABASE_ACCESS_TOKEN"; fi
          if [[ "$HAVE_REF" != "true" ]]; then missing="$missing SUPABASE_PROJECT_REF"; fi
          if [[ "$HAVE_PW" != "true" ]]; then missing="$missing SUPABASE_DB_PASSWORD"; fi
          if [[ -n "$missing" ]]; then
            echo "::warning::Mommy deploy skipped — missing secrets:$missing"
            echo "::warning::Set these in repo Settings → Secrets and variables → Actions, then re-run."
            echo "::warning::Migrations + edge functions can still be applied manually from the host."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Supabase CLI
        if: steps.secrets.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        if: steps.secrets.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          # This repo's migrations are NUMBERED (591_name.sql), applied via the
          # Supabase Management API — the project's actual mechanism
          # (scripts/apply-migration.mjs). `supabase db push` only understands
          # <timestamp>_name.sql, so it SKIPS every numbered file and then
          # errors on the timestamp-based remote history. Apply migrations
          # numbered >= 591 (everything not already on prod) via the API, in
          # order. Each is idempotent (IF NOT EXISTS / OR REPLACE / ON CONFLICT),
          # so re-applying on later deploys is safe.
          set -euo pipefail
          ENDPOINT="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"
          applied=0
          for f in $(ls supabase/migrations/*.sql | sort -V); do
            base=$(basename "$f")
            num=$(echo "$base" | grep -oE '^[0-9]+' || echo 0)
            if [ "${num:-0}" -lt 591 ]; then continue; fi
            echo "→ applying $base"
            jq -Rs '{query: .}' "$f" > /tmp/payload.json
            code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X POST "$ENDPOINT" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary @/tmp/payload.json)
            if [ "$code" -ge 400 ]; then
              echo "::error::migration $base failed (HTTP $code): $(head -c 1000 /tmp/resp.json)"
              exit 1
            fi
            applied=$((applied+1))
            echo "  ok"
          done
          echo "Applied $applied migration(s) >= 591."

      - name: Set up Deno (edge runtime)
        if: steps.secrets.outputs.ready == 'true'
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Type-check edge functions before deploy (audit #12 — no broken code reaches prod)
        if: steps.secrets.outputs.ready == 'true'
        run: |
          # The autonomous builder self-ships edge functions; an un-type-checked
          # deploy turns a type error into a production 500 in the unattended loop
          # (this is how fetPage ReferenceError + duplicate-import slipped through).
          # Gate the deploy on `deno check` so broken code never ships.
          fail=0
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            if [[ "$name" == "_shared" ]]; then continue; fi
            if [[ ! -f "${fn}index.ts" ]]; then continue; fi
            echo "deno check $name…"
            if ! deno check --quiet "${fn}index.ts"; then
              echo "::error::deno check failed for $name"
              fail=1
            fi
          done
          if [[ "$fail" == "1" ]]; then
            # `deno check --quiet` is strict on third-party (esm.sh/jsr) types and
            # is chronically red across ~40 pre-existing functions that nonetheless
            # bundle + run fine — an all-or-nothing abort here blocks every deploy.
            # Downgrade to a warning; the real gate is the per-function result of
            # `supabase functions deploy` below, which fails the job if a function
            # genuinely can't bundle/deploy.
            echo "::warning::deno check reported failures (chronic, mostly pre-existing) — continuing; per-function deploy is the gate."
          fi

      - name: Deploy edge functions
        if: steps.secrets.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          # Deploy every function under supabase/functions/ except _shared.
          # Surface failures (no silent `|| true`): attempt all, then fail the job
          # if any deploy failed, so a broken deploy doesn't pass unnoticed.
          deploy_failed=0
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            if [[ "$name" == "_shared" ]]; then continue; fi
            echo "Deploying $name…"
            if ! supabase functions deploy "$name" --project-ref "$PROJECT_REF" --no-verify-jwt; then
              echo "::warning::deploy failed for $name"
              deploy_failed=1
            fi
          done
          if [[ "$deploy_failed" == "1" ]]; then
            echo "::error::One or more edge function deploys failed (see warnings above)."
            exit 1
          fi
