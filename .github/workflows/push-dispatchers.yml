name: Push Dispatchers
on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 min, UTC
  workflow_dispatch: {}
concurrency:
  group: push-dispatchers
  cancel-in-progress: false
jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: web-push-dispatch
        run: |
          curl -fsS -X POST \
            "https://atevwvexapiykchvqvhm.supabase.co/functions/v1/web-push-dispatch" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"trigger":"github_cron"}' \
            -m 60 || true
      - name: send-notifications
        run: |
          curl -fsS -X POST \
            "https://atevwvexapiykchvqvhm.supabase.co/functions/v1/send-notifications" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"trigger":"github_cron"}' \
            -m 60 || true
