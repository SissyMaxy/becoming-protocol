<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>becoming · redesign directions</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;650;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  html,body{margin:0;padding:0;background:#f0eee9;overflow:hidden;font-family:"Inter",system-ui,sans-serif}
  #root{height:100vh;width:100vw}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="directions/DirectionA.jsx"></script>
<script type="text/babel" src="directions/DirectionB.jsx"></script>
<script type="text/babel" src="directions/DirectionC.jsx"></script>
<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="directions/DirectionAMobile.jsx"></script>

<script type="text/babel">
const ArtboardA = () => <div style={{position:'relative',width:'100%',height:'100%',overflow:'hidden'}}><DirectionA/></div>;
const ArtboardB = () => <div style={{position:'relative',width:'100%',height:'100%',overflow:'hidden'}}><DirectionB/></div>;
const ArtboardC = () => <div style={{position:'relative',width:'100%',height:'100%',overflow:'hidden'}}><DirectionC/></div>;

function App() {
  const W = 1280, H = 1600;
  return (
    <DesignCanvas>
      <DCSection id="redesign" title="becoming · redesign directions" subtitle="Three tonal directions on the same information architecture. Click any artboard to focus. Check boxes, drag the arousal scale — everything is interactive.">
        <DCArtboard id="a" label="A · Refined Dark — cinematic, cleaned up, real hierarchy" width={W} height={H}><ArtboardA/></DCArtboard>
        <DCArtboard id="b" label="B · Editorial — light, serif, journal-like, premium wellness" width={W} height={H}><ArtboardB/></DCArtboard>
        <DCArtboard id="c" label="C · Terminal — quantified-self dashboard, mono grid" width={W} height={H}><ArtboardC/></DCArtboard>
      </DCSection>
      <DCSection id="mobile" title="A · Mobile" subtitle="iOS adaptation of the winning direction. Bottom tab bar, condensed stat row, same modules — check boxes, drag the arousal scale, swap meal tabs.">
        <DCArtboard id="am" label="A · Mobile — today screen" width={402} height={874}>
          <div style={{position:'relative',width:402,height:874,borderRadius:48,overflow:'hidden',background:'#0a0a0d',boxShadow:'inset 0 0 0 1px #1a1a20'}}>
            <DirectionAMobile/>
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
